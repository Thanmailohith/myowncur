<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pom Pom • Tejaswi 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: radial-gradient(ellipse at center, #667eea 0%, #764ba2 100%);
            cursor: none;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            backdrop-filter: blur(10px);
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #f0f0ff, #e0e0ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            filter: drop-shadow(0 10px 30px rgba(255,255,255,0.3));
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 10px 30px rgba(255,255,255,0.3)); }
            to { filter: drop-shadow(0 20px 40px rgba(255,105,180,0.6)); }
        }

        /* Premium Button */
        .premium-btn {
            position: relative;
            padding: 24px 60px;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 600;
            color: #fff;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff, #5f27cd);
            background-size: 400% 400%;
            border: none;
            border-radius: 50px;
            cursor: none;
            overflow: hidden;
            box-shadow: 
                0 20px 40px rgba(255,107,107,0.4),
                0 0 0 1px rgba(255,255,255,0.3) inset;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .premium-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .premium-btn:hover::before {
            left: 100%;
        }

        .premium-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 
                0 30px 60px rgba(255,107,107,0.6),
                0 0 0 1px rgba(255,255,255,0.5) inset;
        }

        .premium-btn:active {
            transform: scale(0.95);
        }

        /* Canvas Layers */
        #bgCanvas, #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Floating Elements */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .float-item {
            position: absolute;
            font-size: 2rem;
            opacity: 0.7;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(120deg); }
            66% { transform: translateY(-10px) rotate(240deg); }
        }

        /* Premium Text Explosion */
        .text-particle {
            position: fixed;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ff69b4, #fff, #54a0ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
            z-index: 20;
            filter: drop-shadow(0 5px 15px rgba(255,105,180,0.5));
            opacity: 0;
            transform: scale(0);
        }

        @media (max-width: 480px) {
            .premium-btn {
                padding: 20px 40px;
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    
    <canvas id="bgCanvas"></canvas>
    <canvas id="particlesCanvas"></canvas>
    <div class="floating-elements" id="floatingElements"></div>
    
    <div class="main-container">
        <h1 class="title">Tejaswi ✨</h1>
        <button class="premium-btn" id="pomBtn">Pom Pom 💖</button>
    </div>

    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Canvas Setup
        const bgCanvas = document.getElementById('bgCanvas');
        const particlesCanvas = document.getElementById('particlesCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const particlesCtx = particlesCanvas.getContext('2d');

        function resizeCanvas() {
            bgCanvas.width = particlesCanvas.width = window.innerWidth;
            bgCanvas.height = particlesCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Premium Background Grid
        class Grid {
            constructor() {
                this.points = [];
                this.init();
            }

            init() {
                const cols = Math.floor(window.innerWidth / 50) + 1;
                const rows = Math.floor(window.innerHeight / 50) + 1;
                
                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        this.points.push({
                            x: i * 50,
                            baseX: i * 50,
                            y: j * 50,
                            baseY: j * 50,
                            phase: Math.random() * Math.PI * 2
                        });
                    }
                }
            }

            animate() {
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                
                this.points.forEach(point => {
                    const wave = Math.sin(Date.now() * 0.001 + point.phase) * 15;
                    point.x = point.baseX + wave;
                    point.y = point.baseY + wave;
                    
                    bgCtx.fillStyle = `rgba(255, 255, 255, ${0.1 + wave * 0.01})`;
                    bgCtx.beginPath();
                    bgCtx.arc(point.x, point.y, 2, 0, Math.PI * 2);
                    bgCtx.fill();
                });
            }
        }

        // Premium Particles
        class PremiumParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.size = Math.random() * 4 + 2;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = `hsl(${Math.random() * 60 + 300}, 100%, 70%)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.size *= 0.995;
            }

            draw() {
                particlesCtx.save();
                particlesCtx.globalAlpha = this.life;
                particlesCtx.fillStyle = this.color;
                particlesCtx.shadowColor = this.color;
                particlesCtx.shadowBlur = 20;
                particlesCtx.beginPath();
                particlesCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                particlesCtx.fill();
                particlesCtx.restore();
            }
        }

        const grid = new Grid();
        const particles = [];
        let mouseX = 0, mouseY = 0;

        function animate() {
            // Background grid
            grid.animate();
            
            // Particles
            particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Mouse attraction
            particles.forEach(p => {
                const dx = mouseX - p.x;
                const dy = mouseY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    p.vx += dx * 0.01;
                    p.vy += dy * 0.01;
                }
            });

            requestAnimationFrame(animate);
        }

        // Floating Elements
        function createFloatingElements() {
            const elements = ['✨', '💫', '🌟', '💖', '💎'];
            for (let i = 0; i < 15; i++) {
                const elem = document.createElement('div');
                elem.className = 'float-item';
                elem.textContent = elements[Math.floor(Math.random() * elements.length)];
                elem.style.left = Math.random() * 100 + '%';
                elem.style.top = Math.random() * 100 + '%';
                elem.style.animationDelay = Math.random() * 6 + 's';
                elem.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.getElementById('floatingElements').appendChild(elem);
            }
        }

        // Premium Text Explosion
        function createPremiumTextExplosion() {
            const message = "I like you Tejaswi 💖";
            const chars = message.split('');
            
            chars.forEach((char, index) => {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'text-particle';
                    particle.textContent = char;
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    particle.style.transform = 'translate(-50%, -50%) scale(0)';
                    
                    document.body.appendChild(particle);

                    // Premium entrance
                    setTimeout(() => {
                        particle.style.transition = 'all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                        particle.style.opacity = '1';
                        particle.style.transform = `translate(-50%, -50%) scale(1.2) rotate(${Math.random() * 180 - 90}deg)`;
                    }, 50);

                    // Premium explosion
                    setTimeout(() => {
                        particle.style.transition = 'all 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
                        particle.style.transform = `translate(${Math.random() * 800 - 400}px, ${Math.random() * 800 - 400}px) scale(0.5) rotate(${Math.random() * 720}deg)`;
                        particle.style.opacity = '0';
                    }, 800);

                    // Cleanup
                    setTimeout(() => {
                        document.body.removeChild(particle);
                    }, 3500);

                    // Canvas particles burst
                    for (let i = 0; i < 15; i++) {
                        setTimeout(() => {
                            particles.push(new PremiumParticle(window.innerWidth / 2, window.innerHeight / 2));
                        }, i * 30);
                    }
                }, index * 120);
            });
        }

        // Event Listeners
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.getElementById('pomBtn').addEventListener('click', (e) => {
            e.preventDefault();
            
            // Button ripple effect
            const ripple = document.createElement('span');
            ripple.style.position = 'absolute';
            ripple.style.borderRadius = '50%';
            ripple.style.background = 'rgba(255,255,255,0.6)';
            ripple.style.transform = 'scale(0)';
            ripple.style.width = '300px';
            ripple.style.height = '300px';
            ripple.style.left = '50%';
            ripple.style.top = '50%';
            ripple.style.transform = 'translate(-50%, -50%) scale(0)';
            e.target.appendChild(ripple);

            ripple.animate([
                { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
                { transform: 'translate(-50%, -50%) scale(4)', opacity: 0 }
            ], {
                duration: 600,
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
            }).onfinish = () => ripple.remove();

            // Main premium animation
            createPremiumTextExplosion();
        });

        // Initialize
        createFloatingElements();
        animate();
    </script>
</body>
</html>
