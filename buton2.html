<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Tejaswi 💖</title>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #8e44ad;
            --accent: #f1c40f;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(ellipse at center, #1a0b2e 0%, #0f051a 70%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Enhanced ambient hearts */
        .ambient-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.15);
            user-select: none;
            pointer-events: none;
            animation: floatUp 12s linear infinite;
            filter: drop-shadow(0 0 10px currentColor);
        }

        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            to { transform: translateY(-20vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        /* Welcome message */
        .welcome {
            position: absolute;
            top: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 3px;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 0.6; transform: translateY(0); }
        }

        #pompom-btn {
            position: relative;
            padding: 28px 70px;
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            background-size: 400% 400%;
            animation: gradientMove 3s ease infinite;
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 70px;
            box-shadow: 
                0 0 40px rgba(255, 0, 127, 0.6),
                0 20px 40px rgba(0,0,0,0.3),
                inset 0 0 30px rgba(255,255,255,0.2);
            cursor: pointer;
            z-index: 100;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(20px);
        }

        #pompom-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 
                0 0 60px rgba(255, 0, 127, 0.8),
                0 25px 50px rgba(0,0,0,0.4);
        }

        #pompom-btn:active {
            transform: scale(0.92);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Enhanced beat flash */
        .beat-flash {
            animation: flash 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes flash {
            0% { 
                background: radial-gradient(ellipse at center, #4a1361 0%, #0f051a 70%);
                filter: brightness(1.5);
            }
            50% { 
                background: radial-gradient(ellipse at center, #ff007f22 0%, #8e44ad44 70%);
                filter: brightness(2);
            }
            100% { 
                background: radial-gradient(ellipse at center, #1a0b2e 0%, #0f051a 70%);
                filter: brightness(1);
            }
        }
    </style>
</head>
<body>
    <div class="welcome">Click for Tejaswi 💕</div>
    
    <button id="pompom-btn">💃 Pom Pom 🕺</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('pompom-btn');
        let particles = [];
        let audioCtx;

        // 1. Setup Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 2. Enhanced Ambient Background
        function createAmbient() {
            const heart = document.createElement('div');
            heart.className = 'ambient-heart';
            const hearts = ['❤️', '💖', '💕', '💗', '✨'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 25 + 12) + 'px';
            heart.style.animationDuration = (Math.random() * 4 + 8) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 12000);
        }
        setInterval(createAmbient, 400);

        // 3. ENHANCED Audio Engine (LOUDER + BETTER)
        function playBeat() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const now = audioCtx.currentTime;

            // LOUD "DOUM" (Bass kick)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(100, now);
            osc1.frequency.exponentialRampToValueAtTime(30, now + 0.3);
            gain1.gain.setValueAtTime(0.7, now);  // LOUDER
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc1.connect(gain1).connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.3);

            // CRISP "TEK" (High hat)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(800, now + 0.15);
            gain2.gain.setValueAtTime(0.4, now + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.15 + 0.08);
            osc2.connect(gain2).connect(audioCtx.destination);
            osc2.start(now + 0.15);
            osc2.stop(now + 0.23);

            // POM sparkle
            const osc3 = audioCtx.createOscillator();
            const gain3 = audioCtx.createGain();
            osc3.type = 'sine';
            osc3.frequency.setValueAtTime(1200, now + 0.25);
            gain3.gain.setValueAtTime(0.3, now + 0.25);
            gain3.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
            osc3.connect(gain3).connect(audioCtx.destination);
            osc3.start(now + 0.25);
            osc3.stop(now + 0.35);
        }

        // 4. ENHANCED Particle System
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.type = Math.floor(Math.random() * 5);
                const angle = (Math.random() - 0.5) * Math.PI * 1.5; // More upward bias
                const force = Math.random() * 15 + 10;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force * -1.2; // Strong upward
                this.gravity = 0.15;
                this.friction = 0.98;
                this.opacity = 1;
                this.rotation = 0;
                this.spin = (Math.random() - 0.5) * 0.15;
                this.scale = Math.random() * 0.8 + 0.6;
                this.color = `hsla(${(Math.random() * 60 + 300) % 360}, 100%, 70%, 1)`; // Pink/purple range
                this.life = 1;
            }

            update() {
                this.vx *= this.friction;
                this.vy += this.gravity;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.spin;
                this.life -= 0.015;
                this.opacity = this.life;
                this.scale += 0.01;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                
                const size = 24;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                
                if (this.type === 0) {
                    ctx.font = `bold ${size}px Arial`;
                    ctx.fillStyle = '#fff';
                    ctx.fillText("Tejaswi", -30, 8);
                } else if (this.type === 1) {
                    ctx.font = `${size}px Arial`;
                    ctx.fillText("💖", 0, 8);
                } else if (this.type === 2) {
                    ctx.font = `${size}px Arial`;
                    ctx.fillText("✨", 0, 8);
                } else if (this.type === 3) {
                    ctx.font = `${size}px Arial`;
                    ctx.fillText("🌟", 0, 8);
                } else {
                    ctx.font = `${size}px Arial`;
                    ctx.fillText("🎀", 0, 8);
                }
                
                ctx.restore();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(15, 5, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }

        // 5. PERFECT Click Handler
        btn.addEventListener('click', (e) => {
            // Visual feedback
            document.body.classList.remove('beat-flash');
            void document.body.offsetWidth;
            document.body.classList.add('beat-flash');

            // LOUD BEAT
            playBeat();

            // EPIC PARTICLE EXPLOSION (150 particles!)
            const rect = btn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(centerX, centerY));
            }
        });

        // Mobile audio unlock
        document.addEventListener('touchstart', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });

        animate();
    </script>
</body>
</html>
