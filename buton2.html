<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pom Pom Button</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      animation: bgShift 10s infinite alternate;
    }

    @keyframes bgShift {
      0% { background: linear-gradient(135deg, #ff9a9e, #fad0c4); }
      50% { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
      100% { background: linear-gradient(135deg, #f6d365, #fda085); }
    }

    button {
      padding: 18px 36px;
      font-size: 1.4rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: #ff6f61;
      color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: pulse 2s infinite;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 15px rgba(255,111,97,0.6); }
      50% { box-shadow: 0 0 35px rgba(255,111,97,1); }
      100% { box-shadow: 0 0 15px rgba(255,111,97,0.6); }
    }

    #message {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      opacity: 0;
      transition: all 1s ease;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <button id="pomPom">Pom Pom</button>
  <div id="message">I like you Tejaswi</div>
  <canvas id="particles"></canvas>

  <audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

  <script>
    const button = document.getElementById('pomPom');
    const message = document.getElementById('message');
    const sound = document.getElementById('sound');
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 6 + 2;
        this.speedX = (Math.random() - 0.5) * 8;
        this.speedY = (Math.random() - 0.5) * 8;
        this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        this.alpha = 1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.size *= 0.95;
        this.alpha -= 0.02;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function handleParticles() {
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
          i--;
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      handleParticles();
      requestAnimationFrame(animate);
    }
    animate();

    button.addEventListener('click', () => {
      sound.play();

      // Animate message
      message.style.opacity = 1;
      message.style.transform = "translate(-50%, -50%) scale(1.2)";
      setTimeout(() => {
        message.style.opacity = 0;
        message.style.transform = "translate(-50%, -50%) scale(0.8)";
      }, 2000);

      // Particle burst
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle(canvas.width/2, canvas.height/2));
      }

      // Button bounce
      button.style.transform = "scale(1.2)";
      setTimeout(() => button.style.transform = "scale(1)", 300);
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
