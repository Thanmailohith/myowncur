<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pom Pom for Tejaswi 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating particles background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s infinite linear;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            color: #fff;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 30px rgba(255,255,255,0.3); }
            to { text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.5); }
        }

        .pom-button {
            position: relative;
            padding: 1.5rem 3rem;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            color: #fff;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.3),
                0 0 0 1px rgba(255,255,255,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            min-width: 280px;
            backdrop-filter: blur(10px);
        }

        .pom-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .pom-button:hover::before {
            left: 100%;
        }

        .pom-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.5),
                0 0 50px rgba(255,107,107,0.5);
        }

        .pom-button:active {
            transform: translateY(-2px) scale(1.02);
        }

        /* Particle Container */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
        }

        .heart {
            position: absolute;
            font-size: clamp(1rem, 3vw, 2rem);
            color: #ff6b6b;
            pointer-events: none;
            animation: heartFloat 3s ease-out forwards;
            text-shadow: 0 0 10px currentColor;
        }

        @keyframes heartFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0) rotate(0deg);
            }
            10% {
                opacity: 1;
                transform: translateY(-10px) scale(1) rotate(5deg);
            }
            90% {
                opacity: 1;
                transform: translateY(-200px) scale(1) rotate(360deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-250px) scale(0.5) rotate(720deg);
            }
        }

        /* Text Animation */
        .love-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(255,255,255,0.5);
            opacity: 0;
            z-index: 200;
            pointer-events: none;
            animation: loveAppear 2s ease-out 0.5s forwards;
        }

        @keyframes loveAppear {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5) rotate(-10deg);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2) rotate(2deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .pom-button {
                padding: 1.2rem 2.5rem;
                min-width: 250px;
            }
            
            h1 {
                margin-bottom: 1.5rem;
            }
        }

        /* Success ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hey Tejaswi! 💕</h1>
        <button class="pom-button" id="pomBtn">
            🎀 POM POM 🎀
        </button>
    </div>

    <div class="particles" id="particles"></div>
    <div class="love-text" id="loveText">I LIKE YOU TEJASWI 💖✨</div>

    <script>
        const pomBtn = document.getElementById('pomBtn');
        const particlesContainer = document.getElementById('particles');
        const loveText = document.getElementById('loveText');

        // Pom Pom Sound (using Web Audio API for mobile compatibility)
        function playPomPomSound() {
            // Create oscillator for pom pom sound
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator1 = audioContext.createOscillator();
            const gainNode1 = audioContext.createGain();
            
            oscillator1.connect(gainNode1);
            gainNode1.connect(audioContext.destination);
            
            oscillator1.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator1.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.1);
            
            gainNode1.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator1.start(audioContext.currentTime);
            oscillator1.stop(audioContext.currentTime + 0.2);

            // Second pom for "pom pom"
            setTimeout(() => {
                const oscillator2 = audioContext.createOscillator();
                const gainNode2 = audioContext.createGain();
                
                oscillator2.connect(gainNode2);
                gainNode2.connect(audioContext.destination);
                
                oscillator2.frequency.setValueAtTime(900, audioContext.currentTime);
                oscillator2.frequency.exponentialRampToValueAtTime(500, audioContext.currentTime + 0.1);
                
                gainNode2.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                
                oscillator2.start(audioContext.currentTime);
                oscillator2.stop(audioContext.currentTime + 0.2);
            }, 100);
        }

        // Create heart particles
        function createParticles() {
            particlesContainer.innerHTML = '';
            loveText.style.display = 'block';
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = ['💖', '💕', '💗', '✨', '🌟', '🎀'][Math.floor(Math.random() * 6)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 0.3 + 's';
                    heart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
                    
                    particlesContainer.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 3000);
                }, i * 50);
            }
        }

        // Ripple effect on click
        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - button.offsetLeft - radius}px`;
            circle.style.top = `${event.clientY - button.offsetTop - radius}px`;
            circle.classList.add('ripple');
            
            const ripple = button.getElementsByClassName('ripple')[0];
            if (ripple) ripple.remove();
            
            button.appendChild(circle);
        }

        // Button click handler
        pomBtn.addEventListener('click', (e) => {
            playPomPomSound();
            createParticles();
            createRipple(e);
            
            // Reset love text after animation
            setTimeout(() => {
                loveText.style.display = 'none';
                particlesContainer.innerHTML = '';
            }, 3000);
        });

        // Resume audio context on first touch (mobile requirement)
        document.addEventListener('touchstart', function() {
            if (!window.audioContextResumed) {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioContext.resume().then(() => {
                    window.audioContextResumed = true;
                });
            }
        }, { once: true });
    </script>
</body>
</html>
