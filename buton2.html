<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pom Pom</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    font-family:sans-serif;
    overflow:hidden;
}

/* BUTTON */
button{
    padding:20px 50px;
    font-size:1.8rem;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
    transition:0.15s;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Press effect */
button:active{
    transform:scale(0.9);
    box-shadow:0 5px 15px rgba(0,0,0,0.4) inset;
}

/* Vibrate */
@keyframes vibrate{
    0%{ transform:translate(0); }
    20%{ transform:translate(-2px,2px); }
    40%{ transform:translate(2px,-2px); }
    60%{ transform:translate(-2px,-2px); }
    80%{ transform:translate(2px,2px); }
    100%{ transform:translate(0); }
}

.vibrate{
    animation:vibrate 0.15s linear infinite;
}

/* PARTICLES */
.particle{
    position:absolute;
    font-size:1.5rem;
    animation:float 4s linear forwards;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(0.5);
        opacity:1;
    }
    100%{
        transform:translateY(-300px) scale(1.2);
        opacity:0;
    }
}

/* TEXT */
#text{
    position:absolute;
    font-size:3rem;
    color:#fff;
    opacity:0;
    transform:scale(0.5);
    transition:all 1.5s ease;
    text-align:center;
}

.show{
    opacity:1;
    transform:scale(1);
}
</style>
</head>

<body>

<button id="btn">POM POM</button>
<div id="text">I LIKE YOU TEJASWI 💖</div>

<script>
let audioCtx;

// 🔊 LORRY HORN SOUND
function playSound(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const now = audioCtx.currentTime;

    const gain = audioCtx.createGain();
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.9, now);

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();

    osc1.type = "square";
    osc2.type = "sawtooth";

    osc1.frequency.setValueAtTime(200, now);
    osc2.frequency.setValueAtTime(230, now);

    osc1.connect(gain);
    osc2.connect(gain);

    osc1.start(now);
    osc2.start(now);

    osc1.stop(now + 0.4);
    osc2.stop(now + 0.4);
}

// ✨ PARTICLES (slow)
function createParticles(){
    const icons = ["💖","✨","💗","⭐"];

    for(let i=0;i<25;i++){
        setTimeout(()=>{
            let p = document.createElement("div");
            p.className="particle";
            p.innerHTML = icons[Math.floor(Math.random()*icons.length)];

            p.style.left = Math.random()*100 + "vw";
            p.style.bottom = "0";

            document.body.appendChild(p);

            setTimeout(()=>p.remove(),4000);
        }, i*120);
    }
}

// CLICK
const btn = document.getElementById("btn");

btn.onclick = ()=>{
    playSound();
    createParticles();

    // 📳 Vibrate button
    btn.classList.add("vibrate");

    setTimeout(()=>{
        btn.classList.remove("vibrate");
    }, 400);

    // 💖 Show text
    setTimeout(()=>{
        document.getElementById("text").classList.add("show");
    }, 600);
};
</script>

</body>
</html>
