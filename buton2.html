<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Tejaswi</title>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #8e44ad;
            --accent: #f1c40f;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f051a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease;
        }

        /* Ambient background hearts */
        .ambient-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            user-select: none;
            pointer-events: none;
            animation: floatUp 10s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.2; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        #pompom-btn {
            position: relative;
            padding: 25px 60px;
            font-size: 28px;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            background-size: 300% 300%;
            animation: gradientMove 4s ease infinite;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.5);
            cursor: pointer;
            z-index: 100;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }

        #pompom-btn:active {
            transform: scale(0.85);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Visual feedback for the beat */
        .beat-flash {
            animation: flash 0.3s ease-out;
        }

        @keyframes flash {
            0% { background-color: #4a1361; }
            100% { background-color: #0f051a; }
        }
    </style>
</head>
<body>

    <button id="pompom-btn">💃 Pom Pom 🕺</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('pompom-btn');
        let particles = [];
        let audioCtx;

        // 1. Setup Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 2. Create Ambient Background (Floating Hearts)
        function createAmbient() {
            const heart = document.createElement('div');
            heart.className = 'ambient-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }
        setInterval(createAmbient, 500);

        // 3. Audio Engine (Belly Dance Beat)
        function playBeat() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;

            // Deep "Doum"
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.4);
            g.gain.setValueAtTime(0.6, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.connect(g).connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.4);

            // Snappy "Tek"
            setTimeout(() => {
                const tOsc = audioCtx.createOscillator();
                const tG = audioCtx.createGain();
                tOsc.type = 'triangle';
                tOsc.frequency.setValueAtTime(400, audioCtx.currentTime);
                tG.gain.setValueAtTime(0.2, audioCtx.currentTime);
                tG.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                tOsc.connect(tG).connect(audioCtx.destination);
                tOsc.start(); tOsc.stop(audioCtx.currentTime + 0.1);
            }, 200);
        }

        // 4. Particle Logic
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.type = Math.floor(Math.random() * 4); // 0=Text, 1=Heart, 2=Star, 3=Circle
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 12 + 8;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.gravity = 0.2;
                this.friction = 0.97;
                this.opacity = 1;
                this.rotation = Math.random() * Math.PI;
                this.spin = (Math.random() - 0.5) * 0.2;
                this.color = `hsla(${Math.random() * 360}, 100%, 70%, 1)`;
                this.size = Math.random() * 20 + 10;
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.opacity -= 0.012;
                this.rotation += this.spin;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;

                if (this.type === 0) {
                    ctx.font = `bold ${this.size}px Arial`;
                    ctx.fillText("i like you Tejaswi", 0, 0);
                } else if (this.type === 1) {
                    ctx.font = `${this.size}px Arial`;
                    ctx.fillText("❤️", 0, 0);
                } else if (this.type === 2) {
                    ctx.font = `${this.size}px Arial`;
                    ctx.fillText("✨", 0, 0);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }

        // 5. Interaction
        btn.addEventListener('click', () => {
            // Screen flash effect
            document.body.classList.remove('beat-flash');
            void document.body.offsetWidth; // Trigger reflow
            document.body.classList.add('beat-flash');

            playBeat();

            const rect = btn.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            // Massive burst of 100 particles
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(startX, startY));
            }
        });

        animate();
    </script>
</body>
</html>
