<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pom pom for Tejaswi 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: linear-gradient(135deg, #ff1493, #c71585, #ba55d3, #ff69b4);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .center-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        button {
            position: relative;
            padding: 32px 68px;
            font-size: clamp(2.4rem, 8vw, 4.2rem);
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            background: linear-gradient(45deg, #ff1493, #ff69b4, #ff1493);
            background-size: 200% 200%;
            border: none;
            border-radius: 50%;
            box-shadow: 
                0 20px 40px rgba(255, 20, 147, 0.6),
                0 0 60px rgba(255, 255, 255, 0.9),
                inset 0 10px 20px rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            min-width: 300px;
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        button::before, button::after {
            content: "🎀";
            font-size: 1.6em;
            animation: pomShake 0.8s infinite alternate;
        }

        @keyframes pomShake {
            from { transform: rotate(-15deg); }
            to { transform: rotate(15deg); }
        }

        button:active {
            transform: scale(0.92) !important;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.2);
            font-size: clamp(2.8rem, 10vw, 6rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 
                0 0 30px #fff,
                0 0 60px #ff69b4,
                0 0 90px #ff1493;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            line-height: 1.05;
            text-align: center;
        }

        .sparkle {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 30;
            animation: floatSparkle 2.5s ease-out forwards;
        }

        @keyframes floatSparkle {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-180px) scale(1.4); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="center-container">
        <button id="pomButton">
            pom pom
        </button>
        
        <div id="message">
            i like you<br>Tejaswi 💖
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const button = document.getElementById('pomButton');
        const message = document.getElementById('message');

        let width, height;
        let particles = [];
        let hearts = [];
        let isAnimating = false;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 9 + 4;
                this.speedX = Math.random() * 22 - 11;
                this.speedY = Math.random() * 22 - 16;
                this.gravity = 0.22;
                this.friction = 0.975;
                this.life = Math.random() * 110 + 80;
                this.hue = Math.random() * 60 + 300; // pink to purple range
                this.alpha = 1;
                this.rotation = Math.random() * 360;
                this.rotSpeed = Math.random() * 12 - 6;
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.life--;
                this.alpha = this.life / 120;
                this.size *= 0.982;
                this.rotation += this.rotSpeed;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 75%)`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 85%)`;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class FloatingHeart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 28 + 22;
                this.speedY = Math.random() * -3.5 - 2;
                this.speedX = Math.random() * 4 - 2;
                this.life = 180;
                this.hue = Math.random() * 40 + 320;
                this.wobble = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 1.2;
                this.wobble += 0.08;
                this.life--;
                this.speedY *= 0.985;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / 180;
                ctx.translate(this.x, this.y);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                const s = this.size;
                ctx.beginPath();
                ctx.moveTo(0, s/2);
                ctx.bezierCurveTo(-s/2, -s/2, -s, s/3, 0, s);
                ctx.bezierCurveTo(s, s/3, s/2, -s/2, 0, s/2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function createBigExplosion(x, y) {
            // Main colorful particles
            for (let i = 0; i < 420; i++) {
                const p = new Particle(x, y);
                p.speedX *= 1.6;
                p.speedY *= 1.6;
                particles.push(p);
            }
            // Extra burst
            for (let i = 0; i < 180; i++) {
                const p = new Particle(x, y);
                p.size = Math.random() * 5 + 2;
                p.life = 55;
                particles.push(p);
            }

            // Floating hearts
            for (let i = 0; i < 35; i++) {
                const h = new FloatingHeart(x + (Math.random()-0.5)*80, y + (Math.random()-0.5)*80);
                hearts.push(h);
            }
        }

        function createSparkleBurst(x, y) {
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.textContent = ['💖','✨','💕','🌸','🎀'][Math.floor(Math.random()*5)];
                    sparkle.style.left = `${x + (Math.random()-0.5)*140}px`;
                    sparkle.style.top = `${y + (Math.random()-0.5)*100}px`;
                    sparkle.style.fontSize = `${Math.random()*1.4 + 1.6}rem`;
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 2800);
                }, i * 35);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(255, 20, 147, 0.08)';
            ctx.fillRect(0, 0, width, height);

            // Update & draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0 || p.size <= 0.3) particles.splice(i, 1);
            }

            // Update & draw floating hearts
            for (let i = hearts.length - 1; i >= 0; i--) {
                const h = hearts[i];
                h.update();
                h.draw();
                if (h.life <= 0) hearts.splice(i, 1);
            }

            requestAnimationFrame(animate);
        }

        function triggerPomPom() {
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            createBigExplosion(centerX, centerY);
            createSparkleBurst(centerX, centerY);

            // Dramatic message reveal
            message.style.transition = 'all 1.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            message.style.opacity = '1';
            message.style.transform = 'translate(-50%, -50%) scale(1.15)';

            setTimeout(() => {
                message.style.transition = 'all 2.5s ease';
                message.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 600);

            // Extra button shake
            button.style.animation = 'none';
            void button.offsetWidth;
            button.style.animation = 'buttonPulse 0.6s';

            if (!isAnimating) {
                isAnimating = true;
                animate();
            }
        }

        // Setup
        window.addEventListener('load', () => {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            button.addEventListener('click', triggerPomPom);
            button.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerPomPom();
            });

            console.log('%c💖 Super charged pom pom ready for Tejaswi! Even more animation loaded!', 'color:#ff1493; font-size:18px; font-weight:bold');
        });
    </script>
</body>
</html>
