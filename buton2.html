<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Tejaswi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0d0221; /* Deep space purple */
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #pomPom {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 900;
            color: white;
            background: linear-gradient(45deg, #ff007f, #7a00ff);
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            cursor: pointer;
            z-index: 10;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease;
        }

        #pomPom:active {
            transform: scale(0.9);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <button id="pomPom">Pom Pom</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const btn = document.getElementById('pomPom');

        let particles = [];
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.reset(x, y);
            }

            reset(x, y) {
                this.x = x;
                this.y = y;
                // Random explosive velocity
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 8 + 4;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force - 3; // Slight initial lift
                
                this.opacity = 1;
                this.scale = Math.random() * 0.5 + 0.8;
                this.rotation = (Math.random() - 0.5) * 0.4;
                this.color = `hsla(${Math.random() * 60 + 330}, 100%, 70%, `; // Pink/Purple range
                this.active = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15; // Gravity
                this.vx *= 0.98; // Friction
                this.opacity -= 0.015;
                if (this.opacity <= 0) this.active = false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color + this.opacity + ')';
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                // DRAW THE ACTUAL TEXT AS THE PARTICLE
                ctx.fillText("i like you Tejaswi", 0, 0);
                ctx.restore();
            }
        }

        function animate() {
            // Faster than clearRect on most mobile devices
            ctx.fillStyle = '#0d0221';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                if (particles[i].active) {
                    particles[i].update();
                    particles[i].draw();
                }
            }
            requestAnimationFrame(animate);
        }

        function trigger() {
            const rect = btn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Trigger 30 text particles per click
            for (let i = 0; i < 30; i++) {
                let p = particles.find(p => !p.active);
                if (!p) {
                    p = new Particle(centerX, centerY);
                    particles.push(p);
                } else {
                    p.reset(centerX, centerY);
                }
            }
        }

        btn.addEventListener('click', trigger);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            trigger();
        });

        animate();
    </script>
</body>
</html>
