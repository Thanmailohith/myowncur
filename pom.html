<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pom Pom</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(45deg, #ff4e50, #fc913a);
        color: white;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    button:active {
        transform: scale(0.9);
    }

    h1 {
        margin-top: 20px;
        color: white;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.8s ease;
    }

    h1.show {
        opacity: 1;
        transform: translateY(0);
    }

    .particle {
        position: absolute;
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="container">
    <button onclick="showLove()">Pom Pom 💖</button>
    <h1 id="text">I like you Tejaswi 💕</h1>
</div>

<script>
function showLove() {
    const text = document.getElementById("text");

    // Show text
    text.classList.add("show");

    // Create particles
    for (let i = 0; i < 80; i++) {
        createParticle();
    }
}

function createParticle() {
    const particle = document.createElement("div");
    particle.classList.add("particle");

    document.body.appendChild(particle);

    const x = window.innerWidth / 2;
    const y = window.innerHeight / 2;

    particle.style.left = x + "px";
    particle.style.top = y + "px";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 150 + 50;

    const xMove = Math.cos(angle) * distance;
    const yMove = Math.sin(angle) * distance;

    particle.animate([
        { transform: "translate(0,0)", opacity: 1 },
        { transform: `translate(${xMove}px, ${yMove}px)`, opacity: 0 }
    ], {
        duration: 1000,
        easing: "ease-out"
    });

    setTimeout(() => {
        particle.remove();
    }, 1000);
}
</script>

</body>
</html>
