<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Tejaswi</title>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #7a00ff;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #ff007f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        #pom-button {
            padding: 20px 50px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
            /* Glassmorphism */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 127, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 0, 127, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 127, 0.3); }
        }

        #pom-button:active {
            transform: scale(0.9);
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <button id="pom-button">pom pom</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const button = document.getElementById('pom-button');

        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, targetX, targetY, color) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.velocity = Math.random() * 0.05 + 0.02;
                this.friction = 0.95;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // Draw tiny hearts instead of circles
                const s = this.size;
                ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
                ctx.fill();
                // Add a glow to each particle
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            }

            update() {
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                this.x += dx * this.velocity;
                this.y += dy * this.velocity;
            }
        }

        function createMessage() {
            particles = [];
            const fontSize = Math.min(canvas.width / 9, 50);
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';

            // Wrap text for mobile
            const line1 = "I like you";
            const line2 = "Tejaswi";
            
            ctx.fillText(line1, canvas.width / 2, canvas.height / 2 - 30);
            ctx.fillText(line2, canvas.width / 2, canvas.height / 2 + 40);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < data.height; y += 4) {
                for (let x = 0; x < data.width; x += 4) {
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        const color = `hsl(${330 + Math.random() * 30}, 100%, 70%)`;
                        particles.push(new Particle(x, y, x, y, color));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        button.addEventListener('click', () => {
            button.classList.add('hidden');
            setTimeout(() => {
                createMessage();
                animate();
            }, 300);
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        });
    </script>
</body>
</html>
