<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Ranjith</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background-color: #050505; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            width: 100vw;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            display: block;
        }
        .container { position: relative; z-index: 10; }
        .touch-me-btn {
            padding: 16px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(252, 0, 255, 0.5);
            transition: opacity 0.5s ease;
        }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>

    <div class="container">
        <button class="touch-me-btn" id="mainBtn">Touch Me</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const btn = document.getElementById('mainBtn');

        let particles = [];
        let animationActive = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(targetX, targetY, color) {
                // Mobile optimization: spawn closer to view to avoid lag
                this.x = Math.random() * canvas.width;
                this.y = Math.random() > 0.5 ? -20 : canvas.height + 20;
                
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                this.size = Math.random() * 1.5 + 0.8;
                this.velocity = 0.015; // Smooth but slightly faster for mobile responsiveness
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                this.x += (this.targetX - this.x) * this.velocity;
                this.y += (this.targetY - this.y) * this.velocity;
            }
        }

        function initAnimation() {
            particles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const isMobile = canvas.width < 600;
            const fontSize = isMobile ? canvas.width * 0.12 : 70;
            
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'white';

            // MOBILE FIX: Draw text in two lines if the screen is narrow
            if (isMobile) {
                ctx.fillText("I LIKE YOU", canvas.width / 2, canvas.height / 2 - fontSize * 0.6);
                ctx.fillText("RANJITH", canvas.width / 2, canvas.height / 2 + fontSize * 0.6);
            } else {
                ctx.fillText("I LIKE YOU RANJITH", canvas.width / 2, canvas.height / 2);
            }

            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Performance tweak: y += 6, x += 6 to keep particle count low for mobile
            const gap = isMobile ? 5 : 4;

            for (let y = 0; y < canvas.height; y += gap) {
                for (let x = 0; x < canvas.width; x += gap) {
                    const index = (y * canvas.width + x) * 4;
                    if (pixels[index + 3] > 128) {
                        const hue = 280 + Math.random() * 40;
                        const color = `hsla(${hue}, 100%, 70%, 0.8)`;
                        particles.push(new Particle(x, y, color));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        btn.addEventListener('click', () => {
            btn.classList.add('hidden');
            animationActive = true;
            initAnimation();
            animate();
        });
    </script>
</body>
</html>
