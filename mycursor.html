<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tubes Cursor</title>

  <!-- CSS INSIDE HTML -->
  <style>
    body, html, #app {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    #app {
      height: 100%;
      font-family: "Montserrat", serif;
    }

    .hero {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h1, h2 {
      margin: 0;
      padding: 0;
      color: white;
      text-shadow: 0 0 20px rgba(0, 0, 0, 1);
      line-height: 100%;
      user-select: none;
      text-transform: uppercase;
    }

    h1 {
      font-size: 80px;
      font-weight: 700;
    }

    h2 {
      font-size: 60px;
      font-weight: 500;
    }

    #canvas {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: hidden;
      z-index: -1;
    }

    #touchMeBtn {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: 600;
      font-family: "Montserrat", serif;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    #touchMeBtn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: #fff;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
      transform: scale(1.05);
    }

    .text-reveal {
      animation: revealAnim 2s ease-in-out forwards;
    }

    @keyframes revealAnim {
      0% { opacity: 0; transform: scale(0.8); text-shadow: 0 0 0px rgba(255,255,255,0); }
      50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 40px rgba(255,20,147,0.8); }
      100% { opacity: 1; transform: scale(1); text-shadow: 0 0 20px rgba(255,20,147,0.5); }
    }
  </style>
</head>

<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <div class="hero">
      <h1 id="mainTitle">Tubes</h1>
      <h2 id="subTitle">Cursor</h2>
      <button id="touchMeBtn">Touch me</button>
    </div>
  </div>

  <!-- JS INSIDE HTML -->
  <script type="module">
    import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js";
    import confetti from "https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.module.mjs";

    const app = TubesCursor(document.getElementById("canvas"), {
      tubes: {
        colors: ["#f967fb", "#53bc28", "#6958d5"],
        lights: {
          intensity: 200,
          colors: ["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"]
        }
      }
    });

    document.body.addEventListener("click", () => {
      const colors = randomColors(3);
      const lightsColors = randomColors(4);

      app.tubes.setColors(colors);
      app.tubes.setLightsColors(lightsColors);
    });

    const touchMeBtn = document.getElementById("touchMeBtn");
    const mainTitle = document.getElementById("mainTitle");
    const subTitle = document.getElementById("subTitle");

    touchMeBtn.addEventListener("click", (e) => {
      e.stopPropagation(); // Prevents randomizing the colors from the body click
      
      // Hide the button smoothly
      touchMeBtn.style.display = "none";
      
      // Change the text to surprise Ranjith
      mainTitle.innerText = "I LIKE YOU";
      subTitle.innerText = "RANJITH";
      
      // Trigger the premium glowing CSS animation
      mainTitle.classList.add("text-reveal");
      subTitle.classList.add("text-reveal");

      // Change Three.js Tubes colors to a romantic theme
      app.tubes.setColors(["#ff0055", "#ff6699", "#cc0044"]);
      app.tubes.setLightsColors(["#ffffff", "#ff00aa", "#ff88cc", "#ff3366"]);

      // Launch the premium Confetti fireworks animation
      const duration = 5 * 1000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        const particleCount = 50 * (timeLeft / duration);
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
      }, 250);
    });

    function randomColors(count) {
      return new Array(count)
        .fill(0)
        .map(
          () =>
            "#" +
            Math.floor(Math.random() * 16777215)
              .toString(16)
              .padStart(6, "0")
        );
    }
  </script>
</body>
</html>
